<body class="insta-flow">
  <header class="topbar" id="topbar">
    <div class="topbar__row">
      <button class="topbar__back" id="backBtn" aria-label="Voltar" type="button">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="topbar__brand">
        <span class="topbar__avatar igring avatar-photo" id="brandAvatar">C</span>
        <span class="topbar__name">
          <span class="topbar__namerow">Carlão Personal das Estrelas
            <svg class="verified" viewBox="0 0 24 24" width="15" height="15" aria-label="verificado"><path fill="#3897f0" d="M12 1.5l2.4 1.8 3 .2 1 2.8 2.3 1.9-.9 2.9.9 2.9-2.3 1.9-1 2.8-3 .2L12 22.5l-2.4-1.8-3-.2-1-2.8L3.3 15.8l.9-2.9-.9-2.9 2.3-1.9 1-2.8 3-.2z"/><path fill="#fff" d="M10.6 14.6l-2.2-2.2 1.1-1.1 1.1 1.1 3.3-3.3 1.1 1.1z"/></svg>
          </span>
          <em>@oficial_carlaopersonal</em>
        </span>
      </div>
      <div class="topbar__count" id="qCount" hidden></div>
    </div>
    <div class="timerbar timerbar--insta" id="timerbar">
      <span class="timerbar__label">CADASTRO DE CRIADORAS · APP DO PAIZÃO</span>
    </div>
    <div class="progress" id="progress"><div class="progress__bar" id="progressBar"></div></div>
  </header>

  <main class="stage" id="stage" aria-live="polite"></main>

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="assets/js/insta-data.js?v=1"></script>
