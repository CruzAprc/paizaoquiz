<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>Diagnóstico do Paizão · Carlão Personal</title>
  <meta name="description" content="Descubra em 2 minutos por que você ainda não secou — e o plano que o paizão faria pra VOCÊ." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500;1,600;1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css?v=6" />
</head>
<body>
  <!-- Header: marca + cronômetro + progresso (perguntas) -->
  <header class="topbar" id="topbar" hidden>
    <div class="topbar__row">
      <button class="topbar__back" id="backBtn" aria-label="Voltar">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="topbar__brand">
        <span class="topbar__avatar igring avatar-photo" id="brandAvatar">C</span>
        <span class="topbar__name">
          <span class="topbar__namerow">Carlão Personal das Estrelas
            <svg class="verified" viewBox="0 0 24 24" width="15" height="15" aria-label="verificado"><path fill="#3897f0" d="M12 1.5l2.4 1.8 3 .2 1 2.8 2.3 1.9-.9 2.9.9 2.9-2.3 1.9-1 2.8-3 .2L12 22.5l-2.4-1.8-3-.2-1-2.8L3.3 15.8l.9-2.9-.9-2.9 2.3-1.9 1-2.8 3-.2z"/><path fill="#fff" d="M10.6 14.6l-2.2-2.2 1.1-1.1 1.1 1.1 3.3-3.3 1.1 1.1z"/></svg>
          </span>
          <em>@oficial_carlaopersonal</em>
        </span>
      </div>
      <div class="topbar__count" id="qCount"></div>
    </div>
    <div class="timerbar" id="timerbar">
      <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true"><circle cx="12" cy="13" r="8" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 9v4l2.5 2M9 2h6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <b id="timerVal">15:00</b>
      <span class="timerbar__label">para preencher · você responde uma vez só</span>
    </div>
    <div class="progress" id="progress"><div class="progress__bar" id="progressBar"></div></div>
  </header>

  <!-- App mount -->
  <main class="stage" id="stage" aria-live="polite"></main>

  <script src="assets/js/quiz-data.js?v=6"></script>
  <script src="assets/js/app.js?v=6"></script>
</body>
</html>
