  <!--

  -->
  <main class="stage" id="stage" aria-live="polite">
    <section class="screen" id="p1-shell" data-p1-shell>
      <h2 class="q__title">Deixa eu começar te conhecendo. Quantos anos você tem?</h2>

          <span class="qcard__bar">Idade: 16-29<span class="qcard__arrow"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span></span>
        </button>

  <!--
    Se a lead está retomando o funil no meio (URL de etapa + sessão), esconde o shell
    da P1 na hora — evita flash da pergunta 1 antes do app.js assumir.
    Espelha a lógica de boot do app.js (path + sessionStorage paizao_quiz_state).
  -->
  <script>
    (function () {
      try {
        var path = String(location.pathname || "/").replace(/^\/+|\/+$/g, "");
        var saved = null;
        try { saved = JSON.parse(sessionStorage.getItem("paizao_quiz_state") || "null"); } catch (e) {}
        var mid = path && path !== "pergunta-1";
        var resume = saved && typeof saved.index === "number" && saved.index > 0;
        if (mid && resume) {
          var shell = document.getElementById("p1-shell");
          if (shell) shell.remove();
          var tb = document.getElementById("topbar");
          if (tb) tb.hidden = true;
        }
      } catch (e) {}
    })();
  </script>
