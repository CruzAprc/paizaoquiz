<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview chart · Quiz Carlão</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 18px; }
    a { display:block; padding:14px 16px; margin:10px 0; border-radius:12px; background:#7c3aed; color:#fff; text-decoration:none; font-weight:700; text-align:center; }
    p { color:#555; font-size:14px; line-height:1.4; }
  </style>
</head>
<body>
  <h1>Preview · Tela 18 (diagnóstico)</h1>
  <p>Clica na trilha. Grava respostas de teste e abre o chart com a foto de meta.</p>
  <a href="#" data-foco="Emagrecer e secar">Trilha SECAR</a>
  <a href="#" data-foco="Ganhar massa">Trilha MASSA</a>
  <a href="#" data-foco="Os dois juntos">Trilha OS DOIS</a>
  <script>
    document.querySelectorAll("a[data-foco]").forEach(a => {
      a.addEventListener("click", e => {
        e.preventDefault();
        const foco = a.dataset.foco;
        sessionStorage.setItem("paizao_quiz_state", JSON.stringify({
          index: 17,
          answers: {
            q1_idade: "30-39",
            q2_foco: foco,
            q3_rotina: "Eu treino, mas não vejo resultado",
            q5_trava: "Falta de motivação e disciplina",
            q7_deixou: "Uns quilinhos a mais",
            q13_primeiro: "Barriga mais seca",
            altura_cm: 165,
            peso_kg: 72
          }
        }));
        location.href = "/?s=17";
      });
    });
  </script>
</body>
</html>
